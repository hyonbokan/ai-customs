[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["test_data"]

[tool.ruff.lint]
# E/W  pycodestyle   F  pyflakes (incl. F401 unused imports, F841 unused vars)
# I    isort   UP  pyupgrade (modern typing: X | None, dict/list builtins)
# B    bugbear   C4  comprehensions
select = ["E", "W", "F", "I", "UP", "B", "C4"]
# Line length is enforced by the formatter, not the linter.
ignore = ["E501"]

[tool.ruff.format]
# Black-compatible formatting.

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
ignore_missing_imports = true
namespace_packages = true
explicit_package_bases = true
exclude = ["test_data"]
# Pragmatic defaults for a prototype: catch real errors without demanding
# full annotations everywhere.
warn_redundant_casts = true
